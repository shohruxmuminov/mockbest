# One-click deploy to Render (https://render.com) — RECOMMENDED.
# Runs the Express server (which serves the React client AND the API), so there
# is NO serverless 404 routing problem. Render also creates the Postgres
# database and wires DATABASE_URL automatically — zero database setup for you.
databases:
  - name: ielts-db
    plan: free

services:
  - type: web
    name: ielts-mock-test
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_CODE
        value: "2010"
      - key: ADMIN_EMAIL
        value: shohruxmuminov201@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: ielts-db
          property: connectionString
